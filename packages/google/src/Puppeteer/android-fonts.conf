<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Chrome-scoped font profile that makes the browser's font-enumeration fingerprint match a real
  Android device instead of the Linux host. Activated via FONTCONFIG_FILE by launchBrowserHelper.js
  ONLY when the referenced dirs exist, so it never breaks an install lacking these fonts.

  Two jobs:
    1. Expose ONLY Roboto + Noto (no <dir> for the system fonts) so the host's DejaVu / Liberation /
       Ubuntu / Cantarell — a dead Linux-desktop signature — are invisible to Chrome.
    2. Alias the web-font family names to Roboto / Noto the way Android's font stack does, so the
       width-detection probe resolves exactly the set a genuine Android reports (Arial, Helvetica,
       Times, Courier, Baskerville, Palatino, Monaco, ... -> Roboto / Noto Serif / Noto Sans Mono).
-->
<fontconfig>
  <dir>/usr/share/fonts/truetype/roboto</dir>
  <dir>/usr/share/fonts/truetype/noto</dir>
  <cachedir>/tmp/.fontconfig-android</cachedir>

  <alias><family>sans-serif</family><prefer><family>Roboto</family></prefer></alias>
  <alias><family>sans</family><prefer><family>Roboto</family></prefer></alias>
  <alias><family>serif</family><prefer><family>Noto Serif</family></prefer></alias>
  <alias><family>monospace</family><prefer><family>Noto Sans Mono</family></prefer></alias>

  <alias><family>Arial</family><prefer><family>Roboto</family></prefer></alias>
  <alias><family>Helvetica</family><prefer><family>Roboto</family></prefer></alias>
  <alias><family>Verdana</family><prefer><family>Roboto</family></prefer></alias>
  <alias><family>Tahoma</family><prefer><family>Roboto</family></prefer></alias>

  <alias><family>Times</family><prefer><family>Noto Serif</family></prefer></alias>
  <alias><family>Times New Roman</family><prefer><family>Noto Serif</family></prefer></alias>
  <alias><family>Georgia</family><prefer><family>Noto Serif</family></prefer></alias>
  <alias><family>Baskerville</family><prefer><family>Noto Serif</family></prefer></alias>
  <alias><family>Goudy</family><prefer><family>Noto Serif</family></prefer></alias>
  <alias><family>ITC Stone Serif</family><prefer><family>Noto Serif</family></prefer></alias>
  <alias><family>Palatino</family><prefer><family>Noto Serif</family></prefer></alias>

  <alias><family>Courier</family><prefer><family>Noto Sans Mono</family></prefer></alias>
  <alias><family>Courier New</family><prefer><family>Noto Sans Mono</family></prefer></alias>
  <alias><family>Monaco</family><prefer><family>Noto Sans Mono</family></prefer></alias>
</fontconfig>
